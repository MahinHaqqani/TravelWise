  const pexelsApiKey = "pPMKuC7BHjrLNYcF2qTeDd0szwZ4t8ob0fhDZ59LOjIztemQBDUD1NcS"; // 🔁 Replace with your actual key

  async function fetchImageFromPexels(query) {
    try {
      const response = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1`, {
        headers: {
          Authorization: pexelsApiKey
        }
      });
      const data = await response.json();
      return data.photos[0]?.src.medium || `https://via.placeholder.com/600x400?text=${encodeURIComponent(query)}`;
    } catch (error) {
      console.error("Image fetch failed:", error);
      return `https://via.placeholder.com/600x400?text=${encodeURIComponent(query)}`;
    }
  }

  async function generateCustomTour() {
  const destination = localStorage.getItem("selectedCountry");
  const startDate = new Date(localStorage.getItem("startDate"));
  const endDate = new Date(localStorage.getItem("endDate"));
  const rankedInterests = JSON.parse(localStorage.getItem("rankedInterests")) || ["Adventure", "History"];
  const days = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

  const outputList = document.getElementById("tourPlanList");
  outputList.innerHTML = "";

  if (!customItineraries[destination]) {
    outputList.innerHTML = `<li>🚧 Itinerary data not available for ${destination}. Try again later.</li>`;
    return;
  }

  for (let i = 0; i < days; i++) {
    const interest = rankedInterests[i % rankedInterests.length];
    const activities = customItineraries[destination][interest];
    const activity = activities ? activities[i % activities.length] : "Explore local area";
    const activityId = activity.replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, ""); // safe HTML ID

    const searchLink = `https://www.google.com/maps/search/${encodeURIComponent(activity + ', ' + destination)}`;
    const imageURL = await fetchImageFromPexels(`${activity} ${destination}`);

    const li = document.createElement("li");
    li.style.marginBottom = "20px";
    li.innerHTML = `
      <div style="border:1px solid #ddd; border-radius:10px; background:white;">
        <img src="${imageURL}" alt="${activity}" style="width:100%; height:200px; object-fit:cover;">
        <div style="padding:15px;">
          <strong>Day ${i + 1}</strong> – <em>${interest}</em>: ${activity}<br>
          <a href="${searchLink}" target="_blank">📍 View on Map</a>

          <button onclick="toggleReviewForm('${activityId}')" style="margin-top: 10px; background-color: #2196F3; color: white; padding: 6px 12px; border: none; border-radius: 5px;">

            <textarea id="review-${activityId}" placeholder="Write your review..." style="width:100%; padding:8px; border-radius:5px;"></textarea>
            <select id="rating-${activityId}" style="margin-top:5px; width:100%; padding:6px;">
              <option value="5">⭐️⭐️⭐️⭐️⭐️</option>

              <option value="3">⭐️⭐️⭐️</option>
              <option value="2">⭐️⭐️</option>

            </select>
            <button onclick="submitUserReview('${activityId}')" style="margin-top: 8px;">Submit</button>
          </div>

          <div id="reviews-${activityId}" style="margin-top:15px;"></div>
        </div>

    `;

};

let history = JSON.parse(localStorage.getItem("recentTrips")) || [];
history.unshift(tripData); // Add to top
history = history.slice(0, 5); // Keep only last 5 trips
localStorage.setItem("recentTrips", JSON.stringify(history));

}

<!-- ✅ Review & Sentiment Logic -->
<script>
  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCcNHr2Em_tPYwiasw7L1ayQ7hHCnDaYhc",
    authDomain: "tripgenie-6fb92.firebaseapp.com",
    databaseURL: "https://tripgenie-6fb92-default-rtdb.firebaseio.com",
    projectId: "tripgenie-6fb92",
    storageBucket: "tripgenie-6fb92.appspot.com",
    messagingSenderId: "813945038133",
    appId: "1:813945038133:web:e24a4aa31b101c9663587c",
    measurementId: "G-BJSFM382Y9"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Toggle review form visibility
  function toggleReviewForm(activityId) {
    const form = document.getElementById(`form-${activityId}`);
    if (form) {
      form.style.display = form.style.display === "none" ? "block" : "none";
    }
  }

  // Submit a review
  async function submitUserReview(activityId) {
    const reviewText = document.getElementById(`review-${activityId}`).value;
    const rating = document.getElementById(`rating-${activityId}`).value;

    if (!reviewText.trim()) {
      alert("Please write something.");
      return;
    }

    const user = localStorage.getItem("loggedInUser") || "guest";

    // Optional: Sentiment Analysis API
    let sentiment = "neutral";
try {
  const response = await fetch("http://127.0.0.1:5000/sentiment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: reviewText.trim() })
  });

  if (!response.ok) throw new Error(`Server error: ${response.status}`);

  const result = await response.json();
  const label = result?.label?.toLowerCase();

  if (["positive", "neutral", "negative"].includes(label)) {
    sentiment = label;
  } else {
    console.warn("Unexpected sentiment label:", label);
  }

} catch (err) {
  console.warn("Sentiment API error:", err.message || err);
}

    const review = {
      user,
      text: reviewText,
      rating: Number(rating),
      timestamp: new Date().toISOString(),
      sentiment,
      activity: activityId
    };

    await db.ref(`reviews/${activityId}`).push(review);

    document.getElementById(`review-${activityId}`).value = "";
    document.getElementById(`rating-${activityId}`).value = "5";
    document.getElementById(`form-${activityId}`).style.display = "none";

    displayReviews(activityId);
  }

  // Display all reviews
  function displayReviews(activityId) {
    const container = document.getElementById(`reviews-${activityId}`);
    const dbRef = db.ref(`reviews/${activityId}`);

    dbRef.on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        container.innerHTML = "<p>No reviews yet.</p>";
        return;
      }

      const allReviews = Object.values(data);
      const sentimentCounts = { positive: 0, neutral: 0, negative: 0 };

      allReviews.forEach((r) => {
        if (r.sentiment in sentimentCounts) {
          sentimentCounts[r.sentiment]++;
        }
      });

      let overallSentiment = "Neutral";
      let icon = "😐";
      if (
        sentimentCounts.positive > sentimentCounts.neutral &&
        sentimentCounts.positive > sentimentCounts.negative
      ) {
        overallSentiment = "Positive";
        icon = "😊";
      } else if (
        sentimentCounts.negative > sentimentCounts.neutral &&
        sentimentCounts.negative > sentimentCounts.positive
      ) {
        overallSentiment = "Negative";
        icon = "😞";
      }

      container.innerHTML = `
        <div style="background:#fff5c4;padding:10px;border-radius:8px;margin-bottom:10px;">
          <strong>Overall Sentiment:</strong> <span style="font-size: 20px;">${icon} ${overallSentiment}</span>
        </div>
      `;

      container.innerHTML += allReviews.map((r) => `
        <div style="background:#f9f9f9;padding:10px;border-radius:8px;margin:10px 0;">
          <strong>${r.user}</strong> <span style="color:#666">(${new Date(r.timestamp).toLocaleString()})</span><br>
          <span style="color:gold;">${"⭐️".repeat(r.rating)}</span><br>
          <span style="background:#ccc; padding:2px 6px; border-radius:4px;">${r.sentiment}</span>
          <p>${r.text}</p>
        </div>
      `).join("");
    });
  }
</script>
<script>
function downloadPDF() {
  const itinerarySection = document.querySelector(".section:nth-of-type(4)");


  const images = itinerarySection.querySelectorAll("img");
  const imagePromises = Array.from(images).map(img => {
    if (!img.complete) {
      return new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }
    return Promise.resolve();
  });

  Promise.all(imagePromises).then(() => {
    html2pdf().from(itinerarySection).set({
      margin: 0.5,
      filename: "Travel_Itinerary.pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: "in", format: "letter", orientation: "portrait" }
    }).save();
  });
}
</script>
