    function getWeightedRecommendations(rankedInterests, countries, topN = 5) {
  const weights = {};
  for (let i = 0; i < rankedInterests.length; i++) {
    weights[rankedInterests[i]] = rankedInterests.length - i;
  }

  const scoredCountries = countries.map(country => {
    let score = 0;
    country.interests.forEach(interest => {
      if (weights[interest]) score += weights[interest];
    });
    return { ...country, score };
  });

  scoredCountries.sort((a, b) => b.score - a.score);
  return scoredCountries.filter(c => c.score > 0).slice(0, topN);
}

const recommendations = getWeightedRecommendations(rankedInterests, countries, 5);
const listEl = document.getElementById("top-choice-list");

listEl.innerHTML = recommendations.length === 0
  ? "<li>Please rank your interests first on the Interests page.</li>"
  : recommendations.map(c => `<li><strong>${c.name}</strong> (Match score: ${c.score})</li>`).join("");

    
    am5.ready(function () {
      var root = am5.Root.new("chartdiv");

      root.setThemes([am5themes_Animated.new(root)]);

      var chart = root.container.children.push(am5map.MapChart.new(root, {
        panX: "none",
        panY: "none",
        wheelY: "none",
        projection: am5map.geoMercator()
      }));

      var polygonSeries = chart.series.push(
        am5map.MapPolygonSeries.new(root, {
          geoJSON: am5geodata_worldLow,
          exclude: ["AQ"]
        })
      );

      polygonSeries.mapPolygons.template.setAll({
        tooltipText: "{name}",
        interactive: true
      });

      polygonSeries.mapPolygons.template.states.create("hover", {
        fill: am5.color(0x677935)
      });

      polygonSeries.mapPolygons.template.events.on("pointerover", function (ev) {
        const code = ev.target.dataItem.dataContext.id;
        if (countryThemes[code]) {
          document.getElementById("hover-box").innerText =
            ev.target.dataItem.dataContext.name + ": " + countryThemes[code].theme;
        }
      });

      polygonSeries.mapPolygons.template.events.on("pointerout", function () {
        document.getElementById("hover-box").innerText =
          "Hover over a country to see what it's known for!";
      });

      polygonSeries.mapPolygons.template.events.on("click", function (ev) {
        const code = ev.target.dataItem.dataContext.id;
        const name = ev.target.dataItem.dataContext.name;
        if (countryThemes[code]) {
          const confirmVisit = confirm(`Plan your visit to ${name} for a ${countryThemes[code].theme.toLowerCase()} experience?`);
          if (confirmVisit) {
            localStorage.setItem("selectedCountry", name);
            localStorage.setItem("theme", countryThemes[code].theme);
            window.location.href = "planner.html"; // next step: planner page
          }
        }
      });

      polygonSeries.mapPolygons.template.adapters.add("fill", function (fill, target) {
        const code = target.dataItem.dataContext.id;
        if (countryThemes[code]) {
          return am5.color(countryThemes[code].color);
        }
        return fill;
      });
      // Create a MapPointSeries for pins
    var pointSeries = chart.series.push(am5map.MapPointSeries.new(root, {}));

    recommendations.forEach(country => {
  pointSeries.data.push({
    geometry: { type: "Point", coordinates: [country.long, country.lat] },
    name: country.name,
    theme: countryThemes[country.code] ? countryThemes[country.code].theme : "Unknown"
  });
});

console.log("Top Pins Plotted:", recommendations.map(r => r.name));

});
