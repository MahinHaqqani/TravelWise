<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rank Your Interests - Travel Planner</title>

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 25px;
      color: #e0e0e0;
    }

    ul#interest-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    ul#interest-list li {
      background: rgba(255, 255, 255, 0.9);
      padding: 15px 20px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      color: #333;
      cursor: move;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s ease;
    }

    ul#interest-list li.dragging {
      opacity: 0.5;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background-color: #ff4b2b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .emoji {
      font-size: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🌍 Rank Your Travel Interests</h2>
  <p>Drag and drop to rank from top to bottom</p>

  <ul id="interest-list">
    <li draggable="true"><span class="emoji">🧗</span> Adventure</li>
    <li draggable="true"><span class="emoji">🏛️</span> History</li>
    <li draggable="true"><span class="emoji">🌲</span> Nature</li>
    <li draggable="true"><span class="emoji">🍜</span> Food</li>
    <li draggable="true"><span class="emoji">🛍️</span> Shopping</li>
  </ul>

  <button onclick="saveInterests()">Continue ➡️</button>
</div>

<audio id="clickSound" preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3" type="audio/mpeg">
</audio>

<script>
/* 🔐 LOGIN GUARD */
const user = localStorage.getItem("loggedInUser");
if (!user) {
  alert("Please login or continue as guest.");
  window.location.href = "auth.html";
}

/* 🔁 DRAG & DROP LOGIC */
const list = document.getElementById("interest-list");
const clickSound = document.getElementById("clickSound");
let draggedItem = null;

list.addEventListener("dragstart", (e) => {
  draggedItem = e.target.closest("li");
  draggedItem.classList.add("dragging");
});

list.addEventListener("dragend", () => {
  if (draggedItem) draggedItem.classList.remove("dragging");
  draggedItem = null;
});

list.addEventListener("dragover", (e) => {
  e.preventDefault();
  const target = e.target.closest("li");
  if (!target || target === draggedItem) return;

  const rect = target.getBoundingClientRect();
  const next = (e.clientY - rect.top) / rect.height > 0.5;
  list.insertBefore(draggedItem, next ? target.nextSibling : target);
});

/* 💾 SAVE INTERESTS (FIXED & FINAL) */
function saveInterests() {
  clickSound.currentTime = 0;
  clickSound.play();

  const rankedInterests = Array.from(
    document.querySelectorAll("#interest-list li")
  ).map(li => li.innerText.replace(/^[^\w]+\s*/, "").trim());

  if (rankedInterests.length === 0) {
    alert("Please rank at least one interest.");
    return;
  }

  localStorage.setItem(
    "rankedInterests",
    JSON.stringify(rankedInterests)
  );

  console.log("Saved interests:", rankedInterests);
  window.location.href = "map.html";
}
</script>

</body>
</html>
